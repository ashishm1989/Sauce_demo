# ============================================================
# SauceDemo Automation - Application Configuration
# ============================================================

# --- Application URL ---
base.url=https://www.saucedemo.com

# --- Valid Credentials ---
valid.username=standard_user
valid.password=secret_sauce

# --- Invalid Credentials (negative tests) ---
invalid.username=locked_out_user
invalid.password=wrong_password

# --- Browser (chrome | firefox | edge) ---
browser=chrome

# --- Headless mode (true | false) ---
headless=true

# --- Implicit wait (seconds) ---
implicit.wait=5

# --- Explicit wait timeout (seconds) ---
explicit.wait=15

# --- Page load timeout (seconds) ---
page.load.timeout=30

# --- Screenshot on failure ---
screenshot.on.failure=true
screenshot.dir=reports/screenshots

# --- Extent Report output path ---
report.path=reports/ExtentReport.html

# --- Log level (DEBUG | INFO | WARN | ERROR) ---
log.level=INFO

# --- Retry count for flaky tests ---
retry.count=2

# --- Products to add to cart (comma-separated names) ---
products.to.add=Sauce Labs Backpack,Sauce Labs Bike Light

# --- Checkout info ---
checkout.firstname=John
checkout.lastname=Doe
checkout.zipcode=12345
